<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACET Attendance Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Dark Mode Vars (Default) */
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --input-fill: transparent;
        }

        .light {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: rgba(0, 0, 0, 0.05);
            --input-fill: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            transition: background 0.4s ease, border 0.4s ease;
        }

        .bento-card {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-bar-fill {
            transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }

        ::-webkit-scrollbar { width: 0px; }

        .input-glow:focus-within {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="flex justify-between items-center px-6 py-6 max-w-5xl mx-auto">
        <div class="flex items-center gap-2">

            <span class="font-bold tracking-tight text-sm">ACET<span class="text-blue-500">ATTENDANCE</span></span>
        </div>

        <button onclick="toggleTheme()" class="glass-panel p-2.5 rounded-xl hover:scale-110 active:scale-90 transition-all cursor-pointer">
            <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-blue-500"></i>
        </button>
    </nav>

    <header class="w-full pt-4 pb-6 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter bg-gradient-to-b from-blue-400 to-blue-600 md:from-current md:to-slate-400 bg-clip-text text-transparent">
            ACET Attendance
        </h1>
        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em] mt-2">quick attendance for acet</p>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        <div id="searchContainer" class="max-w-xl mx-auto mb-12">
            <div class="glass-panel p-2 rounded-2xl flex items-center gap-2 input-glow transition-all duration-300">
                <div class="pl-4 text-slate-500">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </div>
                <input type="text"
                    id="username"
                    placeholder="Enter Roll Number..."
                    class="w-full bg-transparent border-none outline-none py-3 text-lg font-bold placeholder:text-slate-500"
                    autocomplete="off"
                    spellcheck="false">
                <button onclick="fetchAttendance()"
                    class="bg-blue-600 hover:bg-blue-500 text-white p-3 md:px-6 rounded-xl font-bold transition-all active:scale-95 flex items-center gap-2 shadow-lg shadow-blue-900/40">
                    <span class="hidden md:block">Analyze</span>
                    <i data-lucide="zap" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div id="loader" class="hidden flex flex-col items-center gap-4 py-20">
            <div class="relative">
                <div class="w-14 h-14 border-4 border-blue-500/10 border-t-blue-500 rounded-full animate-spin"></div>
                <i data-lucide="refresh-cw" class="w-5 h-5 text-blue-500 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
            </div>
            <p class="text-blue-500 text-[10px] font-black tracking-[0.3em] animate-pulse uppercase">Fetching Data</p>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-panel p-6 rounded-3xl col-span-1 md:col-span-2 flex flex-col justify-between min-h-[160px]">
                    <div>
                        <span class="status-badge bg-blue-500/10 text-blue-500">Verified Student</span>
                        <h2 id="userNameDisplay" class="text-3xl font-black mt-3 truncate">---</h2>
                    </div>
                    <div id="globalAction" class="text-sm font-medium"></div>
                </div>

                <div class="glass-panel p-6 rounded-3xl flex flex-col items-center justify-center text-center">
                    <div id="overallPerc" class="text-6xl font-black text-blue-500 leading-none">0%</div>
                    <span class="text-slate-500 font-bold uppercase text-[10px] mt-2 tracking-widest">Total Aggregate</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="subjectRows"></div>
        </div>
    </main>

    <footer class="mt-20 text-center pb-10">
        <span class="text-slate-500 text-[10px] tracking-[0.5em] font-black uppercase">
            &copy; 2026 | Phani | Sandeep
        </span>
    </footer>

    <script>
        lucide.createIcons();

        // Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');

            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-lucide', 'sun');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        // Initialize Preferences
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.className = savedTheme;
            const icon = document.getElementById('themeIcon');
            icon.setAttribute('data-lucide', savedTheme === 'dark' ? 'moon' : 'sun');
            lucide.createIcons();

            const savedUser = localStorage.getItem('last_roll');
            if (savedUser) document.getElementById('username').value = savedUser;
        }

        async function fetchAttendance() {
            const user = document.getElementById('username').value.trim();
            if (!user) return;
            // localStorage.setItem('last_roll', user);
            document.activeElement.blur();

            const loader = document.getElementById('loader');
            const results = document.getElementById('results');

            gsap.to('#results', { opacity: 0, y: 20, duration: 0.3 });
            setTimeout(() => {
                results.classList.add('hidden');
                loader.classList.remove('hidden');
            }, 300);

            const formData = new FormData();
            formData.append('username', user);

            try {
                const response = await fetch('https://acetquickattendance.onrender.com/api/attendance', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                setTimeout(() => {
                    loader.classList.add('hidden');
                    updateUI(result);
                }, 800);
            } catch (e) {
                loader.classList.add('hidden');
                alert("Connection Interrupted.");
            }
        }

        function updateUI(data) {
            const results = document.getElementById('results');
            const searchContainer = document.getElementById('searchContainer');

            if (!data.name || data.name.toLowerCase() === "undefined") {
                results.classList.add('hidden');
                gsap.to(searchContainer, { x: -10, duration: 0.1, repeat: 5, yoyo: true });
                return;
            }

            results.classList.remove('hidden');
            gsap.fromTo('#results', { opacity: 0, scale: 0.98 }, { opacity: 1, scale: 1, duration: 0.6 });

            document.getElementById('userNameDisplay').innerText = data.name.toUpperCase();

            let totalCond = 0, totalAtt = 0;
            const container = document.getElementById('subjectRows');
            container.innerHTML = '';

            data.data.forEach((sub, index) => {
                const cond = parseInt(sub[2]);
                const att = parseInt(sub[3]);
                const perc = parseFloat(sub[4]);
                totalCond += cond; totalAtt += att;

                const card = document.createElement('div');
                card.className = 'glass-panel p-5 rounded-2xl bento-card group';
                const isLow = perc < 75;
                const progressColor = isLow ? 'bg-red-500' : 'bg-emerald-500';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h3 class="font-bold text-sm md:text-base line-clamp-1 group-hover:text-blue-500 transition-colors">${sub[1]}</h3>
                            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-tighter mt-1">Sessions: ${att} / ${cond}</p>
                        </div>
                        <span class="text-lg font-black ${isLow ? 'text-red-500' : 'text-emerald-500'}">${perc}%</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-500/10 rounded-full overflow-hidden">
                        <div class="progress-bar-fill h-full ${progressColor}" style="width: 0%"></div>
                    </div>
                `;
                container.appendChild(card);
                setTimeout(() => { card.querySelector('.progress-bar-fill').style.width = `${perc}%`; }, 100);
                gsap.from(card, { opacity: 0, y: 20, delay: 0.05 * index });
            });

            const overall = ((totalAtt / totalCond) * 100).toFixed(2);
            const percEl = document.getElementById('overallPerc');
            gsap.fromTo(percEl, { innerText: 0 }, {
                innerText: overall,
                duration: 1.5,
                snap: { innerText: 0.1 },
                onUpdate: () => percEl.innerText += "%"
            });

            const action = document.getElementById('globalAction');
            if (overall >= 75) {
                const canBunk = Math.floor((totalAtt / 0.75) - totalCond);
                const bunkDays = Math.floor(canBunk / 7);
                action.className = "mt-4 font-bold text-emerald-500 flex flex-wrap items-center gap-2";
                action.innerHTML = `<i data-lucide="shield-check" class="w-4 h-4"></i> Safe to bunk ${canBunk} classes <span class="text-slate-500 font-medium text-xs bg-slate-500/5 px-2 py-0.5 rounded-lg">~${bunkDays} days</span>`;
            } else {
                const mustAttend = Math.ceil((0.75 * totalCond - totalAtt) / 0.25);
                const attendDays = Math.ceil(mustAttend / 7);
                action.className = "mt-4 font-bold text-red-500 flex flex-wrap items-center gap-2";
                action.innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4"></i> Attend ${mustAttend} classes <span class="text-slate-500 font-medium text-xs bg-slate-500/5 px-2 py-0.5 rounded-lg">~${attendDays} days</span>`;
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
